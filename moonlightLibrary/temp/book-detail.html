<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitap Detayı — moonlightLibrary</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <div class="stars-bg" id="starsBg"></div>
  <div class="moon-glow"></div>

  <div class="page-wrap">
    <header class="site-header">
      <a href="index.html" class="brand">moonlightLibrary</a>
    </header>

    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kütüphaneye Dön</a>

    <div id="bookContent"></div>

    <div class="empty-state glass-card d-none" id="notFound">
      <i class="fas fa-ghost"></i>
      <h3>Kitap bulunamadı</h3>
      <a href="index.html" class="btn-moon btn-moon-primary mt-3">Ana Sayfaya Dön</a>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'moonlightLibrary_books';
    const params = new URLSearchParams(location.search);
    const bookId = params.get('id');

    function getBooks() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveBooks(books) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function renderStars(rating, interactive) {
      let html = `<div class="stars-rating${interactive ? ' interactive' : ''}" id="${interactive ? 'ratingStars' : ''}">`;
      for (let i = 1; i <= 5; i++) {
        html += `<i class="fas fa-star${i <= rating ? ' filled' : ''}" data-value="${i}"></i>`;
      }
      return html + '</div>';
    }

    function statusLabel(status) {
      const map = { okunacak: 'Okunacak', okunuyor: 'Okunuyor', okundu: 'Okundu' };
      return map[status] || status;
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('tr-TR', {
        day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    function getBook() {
      return getBooks().find(b => b.id === bookId);
    }

    function renderBook() {
      const book = getBook();
      if (!book) {
        document.getElementById('notFound').classList.remove('d-none');
        return;
      }

      const kunye = [
        { label: 'Sayfa', value: book.pages || '—' },
        { label: 'Yayınevi', value: book.publisher || '—' },
        { label: 'Basım Yılı', value: book.publishYear || '—' },
        { label: 'ISBN', value: book.isbn || '—' },
        { label: 'Tür', value: book.genre || '—' },
        { label: 'Dil', value: book.language || '—' },
        { label: 'Durum', value: statusLabel(book.status) }
      ];

      document.getElementById('bookContent').innerHTML = `
        <div class="detail-layout">
          <div>
            <div class="detail-cover glass-card">
              ${book.coverImage
                ? `<img src="${book.coverImage}" alt="${book.title}">`
                : `<div class="book-cover-placeholder" style="aspect-ratio:2/3"><i class="fas fa-book" style="font-size:4rem"></i></div>`}
            </div>
            <div style="margin-top:1rem; display:flex; gap:0.5rem; flex-wrap:wrap">
              <a href="book-form.html?id=${book.id}" class="btn-moon btn-moon-primary btn-moon-sm">
                <i class="fas fa-pen"></i> Düzenle
              </a>
              <button class="btn-moon btn-moon-danger btn-moon-sm" onclick="deleteBook()">
                <i class="fas fa-trash"></i> Sil
              </button>
            </div>
          </div>

          <div class="detail-info">
            <h1>${book.title}</h1>
            <p class="detail-author"><i class="fas fa-pen-nib"></i> ${book.author}</p>

            <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap">
              ${renderStars(book.rating || 0, true)}
              <span class="status-badge status-${book.status}">${statusLabel(book.status)}</span>
            </div>

            <div class="kunye-grid">
              ${kunye.map(k => `
                <div class="kunye-item">
                  <div class="kunye-label">${k.label}</div>
                  <div class="kunye-value">${k.value}</div>
                </div>
              `).join('')}
            </div>

            ${book.description ? `
              <h3 class="section-title"><i class="fas fa-align-left"></i> Açıklama</h3>
              <p class="description-text">${book.description}</p>
            ` : ''}

            <h3 class="section-title"><i class="fas fa-quote-left"></i> Alıntılar</h3>
            <div id="quotesList">
              ${(book.quotes || []).map(q => `
                <div class="glass-card quote-card">
                  <p>"${q.text}"</p>
                  ${q.page ? `<div class="quote-page"><i class="fas fa-bookmark"></i> Sayfa ${q.page}</div>` : ''}
                  <button class="btn-moon btn-moon-ghost btn-moon-sm mt-2" onclick="removeQuote('${q.id}')">
                    <i class="fas fa-times"></i>
                  </button>
                </div>
              `).join('') || '<p class="description-text">Henüz alıntı eklenmemiş.</p>'}
            </div>

            <form class="add-item-form glass-card" style="padding:1.25rem" onsubmit="addQuote(event)">
              <div class="form-row">
                <input type="text" id="quoteText" class="form-control-dark" placeholder="Alıntı metni..." required style="flex:3">
                <input type="number" id="quotePage" class="form-control-dark" placeholder="Sayfa no" min="1" style="flex:1; max-width:120px">
              </div>
              <button type="submit" class="btn-moon btn-moon-primary btn-moon-sm" style="align-self:flex-start">
                <i class="fas fa-plus"></i> Alıntı Ekle
              </button>
            </form>

            <h3 class="section-title"><i class="fas fa-comments"></i> Yorumlar</h3>
            <div id="commentsList">
              ${(book.comments || []).map(c => `
                <div class="glass-card comment-card">
                  <div class="comment-author">${c.author}</div>
                  <p style="margin:0">${c.text}</p>
                  <div class="comment-date">${formatDate(c.createdAt)}</div>
                  <button class="btn-moon btn-moon-ghost btn-moon-sm mt-2" onclick="removeComment('${c.id}')">
                    <i class="fas fa-times"></i>
                  </button>
                </div>
              `).join('') || '<p class="description-text">Henüz yorum eklenmemiş.</p>'}
            </div>

            <form class="add-item-form glass-card" style="padding:1.25rem" onsubmit="addComment(event)">
              <input type="text" id="commentAuthor" class="form-control-dark" placeholder="İsim (opsiyonel)" value="Ben">
              <textarea id="commentText" class="form-control-dark" placeholder="Düşüncelerini yaz..." required></textarea>
              <button type="submit" class="btn-moon btn-moon-primary btn-moon-sm" style="align-self:flex-start">
                <i class="fas fa-plus"></i> Yorum Ekle
              </button>
            </form>
          </div>
        </div>
      `;

      document.querySelectorAll('#ratingStars i').forEach(star => {
        star.addEventListener('click', function() {
          const rating = parseInt(this.dataset.value);
          const books = getBooks();
          const idx = books.findIndex(b => b.id === bookId);
          if (idx !== -1) {
            books[idx].rating = rating;
            saveBooks(books);
            renderBook();
            showToast(`Puan: ${rating}/5`);
          }
        });
      });
    }

    function addQuote(e) {
      e.preventDefault();
      const books = getBooks();
      const idx = books.findIndex(b => b.id === bookId);
      if (idx === -1) return;

      books[idx].quotes = books[idx].quotes || [];
      books[idx].quotes.unshift({
        id: generateId(),
        text: document.getElementById('quoteText').value.trim(),
        page: parseInt(document.getElementById('quotePage').value) || null,
        createdAt: new Date().toISOString()
      });
      saveBooks(books);
      renderBook();
      showToast('Alıntı eklendi');
    }

    function removeQuote(quoteId) {
      const books = getBooks();
      const idx = books.findIndex(b => b.id === bookId);
      if (idx === -1) return;
      books[idx].quotes = books[idx].quotes.filter(q => q.id !== quoteId);
      saveBooks(books);
      renderBook();
    }

    function addComment(e) {
      e.preventDefault();
      const books = getBooks();
      const idx = books.findIndex(b => b.id === bookId);
      if (idx === -1) return;

      books[idx].comments = books[idx].comments || [];
      books[idx].comments.unshift({
        id: generateId(),
        text: document.getElementById('commentText').value.trim(),
        author: document.getElementById('commentAuthor').value.trim() || 'Ben',
        createdAt: new Date().toISOString()
      });
      saveBooks(books);
      renderBook();
      showToast('Yorum eklendi');
    }

    function removeComment(commentId) {
      const books = getBooks();
      const idx = books.findIndex(b => b.id === bookId);
      if (idx === -1) return;
      books[idx].comments = books[idx].comments.filter(c => c.id !== commentId);
      saveBooks(books);
      renderBook();
    }

    function deleteBook() {
      if (!confirm('Bu kitabı silmek istediğine emin misin?')) return;
      const books = getBooks().filter(b => b.id !== bookId);
      saveBooks(books);
      location.href = 'index.html';
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast-msg';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    function initStarsBg() {
      const container = document.getElementById('starsBg');
      for (let i = 0; i < 60; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 1;
        star.style.cssText = `
          width:${size}px; height:${size}px;
          top:${Math.random() * 100}%;
          left:${Math.random() * 100}%;
          --duration:${2 + Math.random() * 4}s;
          --delay:${Math.random() * 5}s;
          --opacity:${0.2 + Math.random() * 0.5};
        `;
        container.appendChild(star);
      }
    }

    initStarsBg();
    renderBook();
  </script>
</body>
</html>
