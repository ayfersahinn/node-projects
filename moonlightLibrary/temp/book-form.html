<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitap Ekle — moonlightLibrary</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <div class="stars-bg" id="starsBg"></div>
  <div class="moon-glow"></div>

  <div class="page-wrap form-page">
    <header class="site-header">
      <a href="index.html" class="brand">moonlightLibrary</a>
    </header>

    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kütüphaneye Dön</a>

    <div class="glass-card">
      <h2 id="formTitle" style="font-size:1.4rem; font-weight:600; margin-bottom:1.5rem">
        <i class="fas fa-book-medical" style="color:var(--accent)"></i> Yeni Kitap Ekle
      </h2>

      <form id="bookForm">
        <div class="form-group">
          <label class="form-label-dark">Kapak Resmi</label>
          <div class="image-upload-area" id="uploadArea">
            <input type="file" id="coverInput" accept="image/*">
            <i class="fas fa-cloud-upload-alt" style="font-size:2rem; color:var(--text-muted)"></i>
            <p style="margin:0.75rem 0 0; color:var(--text-muted); font-size:0.9rem">
              Resim yüklemek için tıkla veya sürükle
            </p>
            <img id="imagePreview" class="image-preview d-none" alt="Önizleme">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label-dark" for="title">Kitap Adı *</label>
          <input type="text" id="title" class="form-control-dark" required placeholder="Örn: Simyacı">
        </div>

        <div class="form-group">
          <label class="form-label-dark" for="author">Yazar *</label>
          <input type="text" id="author" class="form-control-dark" required placeholder="Örn: Paulo Coelho">
        </div>

        <div class="form-group">
          <label class="form-label-dark" for="description">Açıklama</label>
          <textarea id="description" class="form-control-dark" placeholder="Kitap hakkında kısa notlar..."></textarea>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label-dark" for="pages">Sayfa Sayısı</label>
            <input type="number" id="pages" class="form-control-dark" min="1" placeholder="320">
          </div>
          <div class="form-group">
            <label class="form-label-dark" for="publishYear">Basım Yılı</label>
            <input type="number" id="publishYear" class="form-control-dark" min="1000" max="2100" placeholder="2020">
          </div>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label-dark" for="publisher">Yayınevi</label>
            <input type="text" id="publisher" class="form-control-dark" placeholder="Can Yayınları">
          </div>
          <div class="form-group">
            <label class="form-label-dark" for="isbn">ISBN</label>
            <input type="text" id="isbn" class="form-control-dark" placeholder="978...">
          </div>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label-dark" for="genre">Tür</label>
            <input type="text" id="genre" class="form-control-dark" placeholder="Roman, Klasik, Bilim Kurgu...">
          </div>
          <div class="form-group">
            <label class="form-label-dark" for="language">Dil</label>
            <input type="text" id="language" class="form-control-dark" value="Türkçe">
          </div>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label-dark" for="status">Okuma Durumu</label>
            <select id="status" class="form-select-dark">
              <option value="okunacak">Okunacak</option>
              <option value="okunuyor">Okunuyor</option>
              <option value="okundu">Okundu</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label-dark" for="rating">Puan (0-5)</label>
            <select id="rating" class="form-select-dark">
              <option value="0">Puan verilmedi</option>
              <option value="1">★ 1</option>
              <option value="2">★★ 2</option>
              <option value="3">★★★ 3</option>
              <option value="4">★★★★ 4</option>
              <option value="5">★★★★★ 5</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-moon btn-moon-primary">
            <i class="fas fa-save"></i> <span id="submitText">Kaydet</span>
          </button>
          <a href="index.html" class="btn-moon btn-moon-ghost">İptal</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'moonlightLibrary_books';
    const params = new URLSearchParams(location.search);
    const editId = params.get('id');
    let coverImageData = '';

    function getBooks() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveBooks(books) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function initStarsBg() {
      const container = document.getElementById('starsBg');
      for (let i = 0; i < 60; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 1;
        star.style.cssText = `
          width:${size}px; height:${size}px;
          top:${Math.random() * 100}%;
          left:${Math.random() * 100}%;
          --duration:${2 + Math.random() * 4}s;
          --delay:${Math.random() * 5}s;
          --opacity:${0.2 + Math.random() * 0.5};
        `;
        container.appendChild(star);
      }
    }

    if (editId) {
      const book = getBooks().find(b => b.id === editId);
      if (book) {
        document.getElementById('formTitle').innerHTML =
          '<i class="fas fa-pen" style="color:var(--accent)"></i> Kitabı Düzenle';
        document.getElementById('submitText').textContent = 'Güncelle';
        document.getElementById('title').value = book.title;
        document.getElementById('author').value = book.author;
        document.getElementById('description').value = book.description || '';
        document.getElementById('pages').value = book.pages || '';
        document.getElementById('publishYear').value = book.publishYear || '';
        document.getElementById('publisher').value = book.publisher || '';
        document.getElementById('isbn').value = book.isbn || '';
        document.getElementById('genre').value = book.genre || '';
        document.getElementById('language').value = book.language || 'Türkçe';
        document.getElementById('status').value = book.status || 'okunacak';
        document.getElementById('rating').value = book.rating || 0;
        coverImageData = book.coverImage || '';
        if (coverImageData) {
          const preview = document.getElementById('imagePreview');
          preview.src = coverImageData;
          preview.classList.remove('d-none');
        }
      }
    }

    document.getElementById('coverInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        coverImageData = ev.target.result;
        const preview = document.getElementById('imagePreview');
        preview.src = coverImageData;
        preview.classList.remove('d-none');
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('bookForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const bookData = {
        title: document.getElementById('title').value.trim(),
        author: document.getElementById('author').value.trim(),
        description: document.getElementById('description').value.trim(),
        coverImage: coverImageData,
        pages: parseInt(document.getElementById('pages').value) || null,
        publishYear: parseInt(document.getElementById('publishYear').value) || null,
        publisher: document.getElementById('publisher').value.trim(),
        isbn: document.getElementById('isbn').value.trim(),
        genre: document.getElementById('genre').value.trim(),
        language: document.getElementById('language').value.trim(),
        status: document.getElementById('status').value,
        rating: parseInt(document.getElementById('rating').value) || 0
      };

      let books = getBooks();

      if (editId) {
        const idx = books.findIndex(b => b.id === editId);
        if (idx !== -1) {
          books[idx] = {
            ...books[idx],
            ...bookData,
            updatedAt: new Date().toISOString()
          };
        }
      } else {
        books.unshift({
          id: generateId(),
          ...bookData,
          quotes: [],
          comments: [],
          createdAt: new Date().toISOString()
        });
      }

      saveBooks(books);
      location.href = editId ? `book-detail.html?id=${editId}` : 'index.html';
    });

    initStarsBg();
  </script>
</body>
</html>
